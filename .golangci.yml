version: "2"
run:
  modules-download-mode: readonly
linters:
  default: standard
  enable:
    - bodyclose
    - dogsled
    - dupl
    - exhaustive
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - rowserrcheck
    - staticcheck
    - unconvert
    - unparam
    - whitespace
  settings:
    dupl:
      threshold: 100
    errcheck:
      # HTTP handlers rarely recover from ResponseWriter failures; Responder returns error for callers that need it.
      exclude-functions:
        - (github.com/thecodearcher/limen.Responder).JSON
        - (github.com/thecodearcher/limen.Responder).Error
        - (github.com/thecodearcher/limen.Responder).SessionResponse
    funlen:
      lines: 100
      statements: 50
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - octalLiteral
        - whyNoLint
        - wrapperFunc
        - unnamedResult
        - paramTypeCombine
        - rangeValCopy
        - hugeParam
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 17
    gosec:
      # G117 flags normal auth DTO fields (AccessToken, Secret, etc.).
      excludes:
        - G117
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - funlen
          - goconst
          - gocyclo
          - gosec
        path: _test\.go
      - linters:
          - gocyclo
        path: testing_support\.go
      - linters:
          - dupl
        path: _introspect\.go
      - linters:
          - funlen
          - gocyclo
          - goconst
          - gosec
          - staticcheck
          - gocritic
        path: examples/
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/thecodearcher/limen
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
